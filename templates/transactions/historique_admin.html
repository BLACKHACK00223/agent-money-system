<!-- templates/transactions/historique_admin.html -->
{% extends "transactions/dashboard_admin.html" %}
{% load humanize %}

{% block extra_css %}
<style>
    /* Styles spécifiques à la page historique */
    .page-header {
        margin-bottom: 25px;
    }

    .page-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--gray-900);
    }

    /* Filtres - tous alignés sur une seule ligne */
    .filters-card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--gray-200);
    }

    .filters-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 12px;
        align-items: flex-end;
    }

    .filter-group {
        flex: 1;
        min-width: 0;
    }

    .filter-group label {
        display: block;
        font-size: 11px;
        color: var(--gray-600);
        margin-bottom: 5px;
        font-weight: 600;
        white-space: nowrap;
    }

    .filter-group input, .filter-group select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--gray-300);
        border-radius: 8px;
        font-size: 13px;
        background: white;
        font-family: inherit;
        transition: all 0.2s;
    }

    .filter-group input:focus, .filter-group select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
    }

    .filter-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
    }

    .btn-filter, .btn-reset {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
        white-space: nowrap;
    }

    .btn-filter {
        background: var(--primary);
        color: white;
    }

    .btn-filter:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
    }

    .btn-reset {
        background: var(--gray-100);
        color: var(--gray-700);
    }

    .btn-reset:hover {
        background: var(--gray-200);
        transform: translateY(-1px);
    }

    /* Stats */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 25px;
    }

    .stat-card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.2s;
    }

    .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .stat-card .icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .stat-card .icon.primary { background: var(--primary-light); color: var(--primary); }
    .stat-card .icon.success { background: var(--success-light); color: var(--success); }
    .stat-card .icon.danger { background: var(--danger-light); color: var(--danger); }
    .stat-card .icon.warning { background: var(--warning-light); color: var(--warning); }

    .stat-card .info .value {
        font-size: 24px;
        font-weight: 700;
        color: var(--gray-900);
    }

    .stat-card .info .label {
        font-size: 12px;
        color: var(--gray-600);
        margin-top: 4px;
    }

    /* Table - sans contours */
    .table-card {
        background: white;
        border-radius: 16px;
        padding: 0;
        overflow-x: auto;
    }

    .data-table {
        width: 100%;
        border-collapse: collapse;
    }

    .data-table th,
    .data-table td {
        padding: 12px 12px;
        text-align: left;
        border-bottom: 1px solid var(--gray-200);
        font-size: 13px;
    }

    .data-table th {
        background: var(--gray-50);
        font-weight: 600;
        color: var(--gray-700);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .data-table tr:hover {
        background: var(--gray-50);
    }

    .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        display: inline-block;
    }

    .badge-depot { background: var(--success-light); color: var(--success); }
    .badge-retrait { background: var(--danger-light); color: var(--danger); }
    .badge-credit { background: var(--warning-light); color: var(--warning); }

    /* Badge rôle */
    .badge-role {
        display: inline-block;
        font-size: 11px;
        font-weight: 500;
    }
    .badge-role.admin { color: #4f46e5; }
    .badge-role.agent { color: #059669; }
    .badge-role.assistant { color: #d97706; }

    .btn-print {
        background: var(--primary-light);
        color: var(--primary);
        padding: 5px 12px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 11px;
        display: inline-block;
        transition: all 0.2s;
    }

    .btn-print:hover {
        background: var(--primary);
        color: white;
    }

    /* Pagination */
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 25px;
        padding: 10px 0;
    }

    .page-btn {
        padding: 8px 14px;
        background: white;
        border: 1px solid var(--gray-300);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
        color: var(--gray-700);
        transition: all 0.2s;
    }

    .page-btn:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .page-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .page-btn.disabled {
        opacity: 0.5;
        pointer-events: none;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--gray-500);
    }

    /* Responsive */
    @media (max-width: 1100px) {
        .filters-grid {
            flex-wrap: wrap;
        }
        .filter-group {
            min-width: 160px;
        }
    }

    @media (max-width: 768px) {
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .filters-grid {
            flex-direction: column;
        }
        .filter-group {
            width: 100%;
        }
        .filter-actions {
            flex-direction: row;
        }
        .btn-filter, .btn-reset {
            flex: 1;
            text-align: center;
        }
        .data-table th, .data-table td {
            padding: 8px;
            font-size: 11px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Historique des transactions</h1>
</div>

<!-- Filtres alignés sur une seule ligne -->
<div class="filters-card">
    <div class="filters-grid">
        <div class="filter-group">
            <label>👤 Utilisateur</label>
            <select name="user_id" id="filter-user">
                <option value="">Tous</option>

                    {% for admin in admins %}
                        <option value="{{ admin.user.id }}">{{ admin.nom }}</option>
                    {% endfor %}

                    {% for agent in agents %}
                        <option value="{{ agent.user.id }}">{{ agent.nom }}</option>
                    {% endfor %}
                    {% for assistant in assistants %}
                        <option value="{{ assistant.user.id }}">{{ assistant.nom }}</option>
                    {% endfor %}
                
            </select>
        </div>
        <div class="filter-group">
            <label>🔄 Type</label>
            <select name="type" id="filter-type">
                <option value="">Tous</option>
                <option value="depot">Dépôt</option>
                <option value="retrait">Retrait</option>
                <option value="credit">Crédit</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🏢 Opérateur</label>
            <select name="operateur" id="filter-operateur">
                <option value="">Tous</option>
                <option value="orange">Orange Money</option>
                <option value="wave">Wave</option>
                <option value="malitel">Malitel</option>
                <option value="telecel">Telecel</option>
            </select>
        </div>
        <div class="filter-group">
            <label>📅 Début</label>
            <input type="date" name="date_debut" id="filter-date-debut">
        </div>
        <div class="filter-group">
            <label>📅 Fin</label>
            <input type="date" name="date_fin" id="filter-date-fin">
        </div>
        <div class="filter-actions">
            <button type="button" class="btn-filter" id="btn-apply">🔍 VALIDER</button>
            <button type="button" class="btn-reset" id="btn-reset">🗑️ RÉINITIALISER</button>
        </div>
    </div>
</div>

<!-- Stats -->
<div class="stats-grid" id="stats-container">
    <div class="stat-card">
        <div class="icon primary">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/>
            </svg>
        </div>
        <div class="info">
            <div class="value" id="stat-count">0</div>
            <div class="label">Transactions</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon success">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 8v8M8 12h8"/>
            </svg>
        </div>
        <div class="info">
            <div class="value" id="stat-entree">0</div>
            <div class="label">Total ENTREE</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon danger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <path d="M8 12h8"/>
            </svg>
        </div>
        <div class="info">
            <div class="value" id="stat-sortie">0</div>
            <div class="label">Total SORTIE</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="icon warning">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83"/>
            </svg>
        </div>
        <div class="info">
            <div class="value" id="stat-commission">0</div>
            <div class="label">Commission totale</div>
        </div>
    </div>
</div>

<!-- Tableau des transactions - sans contours -->
<div class="table-card">
    <div id="table-container">
        <div style="text-align: center; padding: 40px;">Chargement...</div>
    </div>
    <div id="pagination-container" class="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;

    function getFilters() {
        return {
            user_id: document.getElementById('filter-user').value,
            type: document.getElementById('filter-type').value,
            operateur: document.getElementById('filter-operateur').value,
            date_debut: document.getElementById('filter-date-debut').value,
            date_fin: document.getElementById('filter-date-fin').value,
            page: currentPage
        };
    }

    function setFiltersFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('filter-user').value = urlParams.get('user_id') || '';
        document.getElementById('filter-type').value = urlParams.get('type') || '';
        document.getElementById('filter-operateur').value = urlParams.get('operateur') || '';
        document.getElementById('filter-date-debut').value = urlParams.get('date_debut') || '';
        document.getElementById('filter-date-fin').value = urlParams.get('date_fin') || '';
        currentPage = parseInt(urlParams.get('page')) || 1;
    }

    function updateURL() {
        const filters = getFilters();
        const params = new URLSearchParams();
        if (filters.user_id) params.set('user_id', filters.user_id);
        if (filters.type) params.set('type', filters.type);
        if (filters.operateur) params.set('operateur', filters.operateur);
        if (filters.date_debut) params.set('date_debut', filters.date_debut);
        if (filters.date_fin) params.set('date_fin', filters.date_fin);
        if (currentPage > 1) params.set('page', currentPage);
        const newURL = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history.pushState({}, '', newURL);
    }

    function getRoleIcon(userType) {
        switch(userType) {
            case 'admin': return '';
            case 'agent': return '';
            case 'assistant': return '';
            default: return '❓';
        }
    }

    function loadTransactions() {
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'block';

        const filters = getFilters();
        const params = new URLSearchParams();
        if (filters.user_id) params.set('user_id', filters.user_id);
        if (filters.type) params.set('type', filters.type);
        if (filters.operateur) params.set('operateur', filters.operateur);
        if (filters.date_debut) params.set('date_debut', filters.date_debut);
        if (filters.date_fin) params.set('date_fin', filters.date_fin);
        params.set('page', currentPage);
        params.set('ajax', '1');

        fetch(window.location.pathname + '?' + params.toString(), {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                renderTable(data.transactions);
                renderPagination(data.pagination);
                updateStats(data.stats);
                updateURL();
            } else {
                document.getElementById('table-container').innerHTML = '<div class="empty-state">📭 Erreur de chargement</div>';
            }
            if (loading) loading.style.display = 'none';
        })
        .catch(error => {
            console.error('Erreur:', error);
            document.getElementById('table-container').innerHTML = '<div class="empty-state">📭 Erreur de connexion</div>';
            if (loading) loading.style.display = 'none';
        });
    }

    function renderTable(transactions) {
        if (!transactions || transactions.length === 0) {
            document.getElementById('table-container').innerHTML = '<div class="empty-state">📭 Aucune transaction trouvée</div>';
            return;
        }

        let html = `<table class="data-table"><thead><tr>
            <th>Référence</th><th>Utilisateur</th><th>Rôle</th><th>Date</th>
            <th>Type</th><th>Opérateur</th><th>Client</th>
            <th>Montant</th><th>Commission</th><th>Action</th>
        </tr></thead><tbody>`;

        for (const t of transactions) {
            const badgeClass = `badge-${t.type}`;
            const typeLabel = t.type === 'depot' ? 'Dépôt' : (t.type === 'retrait' ? 'Retrait' : 'Crédit');
            const roleIcon = getRoleIcon(t.user_type);
            const roleClass = `badge-role ${t.user_type}`;
            
            html += `<tr>
                <td><small>${t.reference}</small></td>
                <td>${t.user_name}</td>
                <td><span class="${roleClass}">${roleIcon} ${t.user_type === 'admin' ? 'Admin' : (t.user_type === 'agent' ? 'Agent' : 'Assistant')}</span></td>
                <td><small>${t.date}</small></td>
                <td><span class="badge ${badgeClass}">${typeLabel}</span></td>
                <td>${t.operateur_label}</td>
                <td>${t.numero_client}</td>
                <td><strong>${formatNumber(t.montant)} FCFA</strong></td>
                <td>${formatNumber(t.commission)} FCFA</span></td>
                <td><a href="/impression/${t.reference}/" target="_blank" class="btn-print">🖨️</a></td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('table-container').innerHTML = html;
    }

    function renderPagination(pagination) {
        if (!pagination || pagination.total_pages <= 1) {
            document.getElementById('pagination-container').innerHTML = '';
            return;
        }

        let html = '';
        if (pagination.has_previous) {
            html += `<button class="page-btn" data-page="${pagination.previous_page}">← Précédent</button>`;
        } else {
            html += `<span class="page-btn disabled">← Précédent</span>`;
        }

        for (let i = pagination.start_page; i <= pagination.end_page; i++) {
            if (i === pagination.current_page) {
                html += `<span class="page-btn active">${i}</span>`;
            } else {
                html += `<button class="page-btn" data-page="${i}">${i}</button>`;
            }
        }

        if (pagination.has_next) {
            html += `<button class="page-btn" data-page="${pagination.next_page}">Suivant →</button>`;
        } else {
            html += `<span class="page-btn disabled">Suivant →</span>`;
        }

        document.getElementById('pagination-container').innerHTML = html;

        document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', function() {
                currentPage = parseInt(this.dataset.page);
                loadTransactions();
            });
        });
    }

    function updateStats(stats) {
        document.getElementById('stat-count').textContent = stats.count || 0;
        document.getElementById('stat-entree').textContent = formatNumber(stats.total_entree || 0);
        document.getElementById('stat-sortie').textContent = formatNumber(stats.total_sortie || 0);
        document.getElementById('stat-commission').textContent = formatNumber(stats.total_commission || 0);
    }

    function formatNumber(num) {
        return new Intl.NumberFormat('fr-FR').format(num);
    }

    // Événements
    document.getElementById('btn-apply').addEventListener('click', function() {
        currentPage = 1;
        loadTransactions();
    });

    document.getElementById('btn-reset').addEventListener('click', function() {
        document.getElementById('filter-user').value = '';
        document.getElementById('filter-type').value = '';
        document.getElementById('filter-operateur').value = '';
        document.getElementById('filter-date-debut').value = '';
        document.getElementById('filter-date-fin').value = '';
        currentPage = 1;
        loadTransactions();
    });

    // Initialisation
    setFiltersFromURL();
    loadTransactions();
</script>
{% endblock %}
